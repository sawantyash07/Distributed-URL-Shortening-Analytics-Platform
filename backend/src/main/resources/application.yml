spring:
  application:
    name: url-shortener
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${SPRING_DATASOURCE_USERNAME:urlshortener}
    password: ${SPRING_DATASOURCE_PASSWORD:urlshortener}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.urlshortener: INFO
    org.springframework.security: WARN

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  short-base-url: ${SHORT_BASE_URL:http://localhost:8080/r}
  jwt:
    secret: ${JWT_SECRET:change-this-super-long-secret-for-production-change-this-super-long-secret}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
  rate-limits:
    auth-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:20}
    create-per-minute: ${RATE_LIMIT_CREATE_PER_MINUTE:120}
    redirect-per-minute: ${RATE_LIMIT_REDIRECT_PER_MINUTE:600}
